version: '3.8'

# =============================================================================
# Paperclip Multi-Agent - All-in-One Setup
# Based on MadeByAdem/paperclipai-docker with all agents included
# =============================================================================

services:
  # ── PostgreSQL 17 ─────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Hardening
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/postgresql
    networks:
      - paperclip-net

  # ── Paperclip Hub (with all agents) ─────────────────────────────────
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paperclip-hub
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      NODE_ENV: production
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?Generate with: openssl rand -hex 32}"
      # MiniMax Token Plan (Claude + OpenClaw)
      MINIMAX_ANTHROPIC_URL: "${MINIMAX_ANTHROPIC_URL:-https://api.minimax.io/anthropic}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-}"
      MINIMAX_MODEL: "${MINIMAX_MODEL:-MiniMax-M2.7}"
      # GLM Coding Plan (Hermes)
      GLM_ANTHROPIC_URL: "${GLM_ANTHROPIC_URL:-https://api.z.ai/api/anthropic}"
      GLM_API_KEY: "${GLM_API_KEY:-}"
      GLM_MODEL: "${GLM_MODEL:-GLM-4.7}"
    volumes:
      - paperclip-config:/paperclip
      - workspace:/workspace:rw
    depends_on:
      db:
        condition: service_healthy
    # Hardening
    security_opt:
      - no-new-privileges:true
    pids_limit: 4096
    shm_size: 256m
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - paperclip-net

volumes:
  paperclip-config:
    driver: local
  workspace:
    driver: local
  pgdata:
    driver: local

networks:
  paperclip-net:
    driver: bridge