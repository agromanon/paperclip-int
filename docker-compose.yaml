version: '3.8'

# ============================================================
# RUNTIME PHASE - Locked down multi-agent setup
# MiniMax Token Plan (Claude, OpenClaw) + GLM Coding Plan (Hermes)
# Based on: https://github.com/MadeByAdem/paperclipai-docker
# ============================================================

services:
  # ── PostgreSQL 17 ─────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Hardening
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/postgresql
    networks:
      - agent-net

  # ── Paperclip Hub ─────────────────────────────────────────
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paperclip-hub
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      NODE_ENV: production
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?Generate with: openssl rand -hex 32}"
      # API keys for AI agents (optional)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # MiniMax Token Plan (Claude + OpenClaw)
      MINIMAX_ANTHROPIC_URL: "${MINIMAX_ANTHROPIC_URL:-https://api.minimax.io/anthropic}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-}"
      MINIMAX_MODEL: "${MINIMAX_MODEL:-MiniMax-M2.7}"
      # GLM Coding Plan (Hermes)
      GLM_ANTHROPIC_URL: "${GLM_ANTHROPIC_URL:-https://api.z.ai/api/anthropic}"
      GLM_API_KEY: "${GLM_API_KEY:-}"
      GLM_MODEL: "${GLM_MODEL:-GLM-4.7}"
    volumes:
      - paperclip-config:/paperclip
      - workspace:/workspace:rw
    depends_on:
      db:
        condition: service_healthy
    # Hardening
    security_opt:
      - no-new-privileges:true
    pids_limit: 4096
    shm_size: 256m
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - agent-net

  # ── Claude Agent ─────────────────────────────────────────
  claude-agent:
    image: node:22-alpine
    container_name: claude-agent
    restart: unless-stopped
    read_only: true
    user: "1000:1000"
    volumes:
      - agent-configs:/root:ro
      - workspace:/workspace:rw
    environment:
      - ANTHROPIC_BASE_URL=${MINIMAX_ANTHROPIC_URL:-https://api.minimax.io/anthropic}
      - ANTHROPIC_AUTH_TOKEN=${MINIMAX_API_KEY}
      - API_TIMEOUT_MS=3000000
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - ANTHROPIC_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - HOME=/root
      - PATH=/usr/local/bin:/usr/bin:/bin:/workspace/bin
      - CLAUDE_WORKSPACE=/workspace
    entrypoint: ["ash", "-c", "
      chmod 755 /workspace 2>/dev/null || true
      claude-code start --workspace /workspace --non-interactive
    "]
    networks:
      - agent-net
    dns:
      - 127.0.0.1
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G

  # ── Hermes Agent ─────────────────────────────────────────
  hermes-agent:
    image: node:22-alpine
    container_name: hermes-agent
    restart: unless-stopped
    read_only: true
    user: "1001:1001"
    volumes:
      - agent-configs:/root:ro
      - workspace:/workspace:rw
    environment:
      - ANTHROPIC_BASE_URL=${GLM_ANTHROPIC_URL:-https://api.z.ai/api/anthropic}
      - ANTHROPIC_AUTH_TOKEN=${GLM_API_KEY}
      - API_TIMEOUT_MS=3000000
      - ANTHROPIC_MODEL=${GLM_MODEL:-GLM-4.7}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${GLM_MODEL:-GLM-4.7}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${GLM_MODEL:-GLM-4.7}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=GLM-4.5-Air
      - HOME=/root
      - PATH=/usr/local/bin:/usr/bin:/bin
      - CLAUDE_WORKSPACE=/workspace
    entrypoint: ["ash", "-c", "
      chmod 755 /workspace 2>/dev/null || true
      hermes start --workspace /workspace --daemon
    "]
    networks:
      - agent-net
    dns:
      - 127.0.0.1
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # ── OpenClaw Agent ───────────────────────────────────────
  openclaw-agent:
    image: node:22-alpine
    container_name: openclaw-agent
    restart: unless-stopped
    read_only: true
    user: "1002:1002"
    volumes:
      - agent-configs:/root:ro
      - workspace:/workspace:rw
    environment:
      - ANTHROPIC_BASE_URL=${MINIMAX_ANTHROPIC_URL:-https://api.minimax.io/anthropic}
      - ANTHROPIC_AUTH_TOKEN=${MINIMAX_API_KEY}
      - API_TIMEOUT_MS=3000000
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - ANTHROPIC_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - HOME=/root
      - PATH=/usr/local/bin:/usr/bin:/bin
      - CLAUDE_WORKSPACE=/workspace
    entrypoint: ["ash", "-c", "
      chmod 755 /workspace 2>/dev/null || true
      openclaw agent start --workspace /workspace
    "]
    networks:
      - agent-net
    dns:
      - 127.0.0.1
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

volumes:
  paperclip-config:
    driver: local
  agent-configs:
    driver: local
  workspace:
    driver: local
  pgdata:
    driver: local

networks:
  agent-net:
    driver: bridge